<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>React</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>

    <hr>

    <div id="root"></div>

    <br>

    <button onclick="window.location.href='index.html'">
        Volver al inicio
    </button>

    <script type="text/babel">

        function App() {
            const [personas, setPersonas] = React.useState([]);

            const [formulario, setFormulario] = React.useState({
                nombre: "",
                apellido: "",
                edad: "",
                altura: "",
                peso: ""
            });

            function manejarCambio(e) {
                setFormulario({
                    ...formulario,
                    [e.target.name]: e.target.value
                });
            }

            function agregarPersona(e) {
                e.preventDefault();

                if (
                    !formulario.nombre ||
                    !formulario.apellido ||
                    !formulario.edad ||
                    !formulario.altura ||
                    !formulario.peso
                ) {
                    return;
                }

                setPersonas([...personas, formulario]);

                setFormulario({
                    nombre: "",
                    apellido: "",
                    edad: "",
                    altura: "",
                    peso: ""
                });
            }

            function eliminarPersona(index) {
                setPersonas(
                    personas.filter((_, i) => i !== index)
                );
            }

            function calcularIMC(peso, altura) {
                const p = parseFloat(peso);
                const a = parseFloat(altura);

                if (!p || !a) return "";

                return (p / (a * a)).toFixed(2);
            }

            return (
                <div>
                    <h2>Personas con React</h2>

                    <form onSubmit={agregarPersona}>

                        <input
                            name="nombre"
                            placeholder="Nombre"
                            value={formulario.nombre}
                            onChange={manejarCambio}
                        />

                        <input
                            name="apellido"
                            placeholder="Apellido"
                            value={formulario.apellido}
                            onChange={manejarCambio}
                        />

                        <input
                            name="edad"
                            type="number"
                            placeholder="Edad"
                            value={formulario.edad}
                            onChange={manejarCambio}
                        />

                        <input
                            name="altura"
                            type="number"
                            step="0.01"
                            placeholder="Altura"
                            value={formulario.altura}
                            onChange={manejarCambio}
                        />

                        <input
                            name="peso"
                            type="number"
                            placeholder="Peso"
                            value={formulario.peso}
                            onChange={manejarCambio}
                        />

                        <button type="submit">
                            Agregar
                        </button>

                    </form>

                    <hr />

                    <table border="1">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura</th>
                                <th>Peso</th>
                                <th>IMC</th>
                                <th>Acción</th>
                            </tr>
                        </thead>

                        <tbody>
                            {personas.map((p, i) => (
                                <tr key={i}>
                                    <td>{p.nombre}</td>
                                    <td>{p.apellido}</td>
                                    <td>{p.edad}</td>
                                    <td>{p.altura}</td>
                                    <td>{p.peso}</td>
                                    <td>{calcularIMC(p.peso, p.altura)}</td>
                                    <td>
                                        <button onClick={() => eliminarPersona(i)}>
                                            Eliminar
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                </div>
            );
        }

        const root = ReactDOM.createRoot(
            document.getElementById("root")
        );

        root.render(<App />);

    </script>

</body>
</html>
